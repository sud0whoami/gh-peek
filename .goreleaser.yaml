project_name: gh-peek
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gh-peek
    main: ./cmd/gh-peek
    binary: gh-peek
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
  # Raw binaries with the naming convention `gh extension install` expects:
  # `<extension>-<os>-<arch>[.exe]` (hyphens, no version, no archive).
  - id: gh-extension
    formats: [binary]
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: true
