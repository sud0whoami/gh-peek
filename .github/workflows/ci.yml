name: CI
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -count=1 ./...
